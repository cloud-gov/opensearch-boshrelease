  ruby {
    code => '
      message = event.get("message")
      json_objects = []
      brace_count = 0
      start_pos = 0
      batch_size = 1000  # Process in batches of 1000
      
      message.each_char.with_index do |char, index|
        if char == "{"
          start_pos = index if brace_count == 0
          brace_count += 1
        elsif char == "}"
          brace_count -= 1
          if brace_count == 0
            json_objects << message[start_pos..index]
            
            # Process in batches to avoid memory issues
            if json_objects.length >= batch_size
              event.set("message", json_objects.join("\n"))
              event.set("[@metadata][batch_number]", (json_objects.length / batch_size).to_i)
              json_objects = []  # Reset for next batch
              break  # Process this batch, remaining will be handled by next iteration
            end
          end
        end
      end
      
      # Handle remaining objects
      if json_objects.length > 0
        event.set("message", json_objects.join("\n"))
        event.set("[@metadata][object_count]", json_objects.length)
      end
    '
  }
  
  split {
    field => "message"
    terminator => "\n"
  }
  
  json {
    source => "message"
    tag_on_failure => ["_jsonparsefailure"]
  }