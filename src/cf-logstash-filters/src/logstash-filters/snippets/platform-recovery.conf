  # Split concatenated JSON objects
  ruby {
    code => '
      require "json"
      
      message = event.get("message")
      json_objects = []
      brace_count = 0
      start_pos = 0
      
      message.each_char.with_index do |char, index|
        if char == "{"
          start_pos = index if brace_count == 0
          brace_count += 1
        elsif char == "}"
          brace_count -= 1
          if brace_count == 0
            json_objects << message[start_pos..index]
          end
        end
      end
      
      if json_objects.length > 0
        event.set("message", json_objects[0])
        
        json_objects[1..-1].each do |json_str|
          new_event = LogStash::Event.new("message" => json_str)
          new_event.set("[@timestamp]", event.get("[@timestamp]"))
          new_event_queue << new_event
        end
      end
    '
  }
  
  json {
    source => "message"
    tag_on_failure => ["_jsonparsefailure"]
  }